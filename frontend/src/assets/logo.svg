<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c471f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="url(#neonGrad)" stroke-width="2" opacity="0.9"/>
  
  <!-- Network Connection Lines -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Lines from Z corners to nodes -->
    <line x1="110" y1="120" x2="80" y2="80" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="290" y1="120" x2="320" y2="80" stroke="#7b2ff7" stroke-width="1.5"/>
    <line x1="110" y1="280" x2="80" y2="320" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="290" y1="280" x2="320" y2="320" stroke="#7b2ff7" stroke-width="1.5"/>
    <line x1="200" y1="120" x2="200" y2="60" stroke="#c471f5" stroke-width="1.5"/>
    <line x1="200" y1="280" x2="200" y2="340" stroke="#c471f5" stroke-width="1.5"/>
    <!-- Cross connections -->
    <line x1="80" y1="80" x2="200" y2="60" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="200" y1="60" x2="320" y2="80" stroke="#7b2ff7" stroke-width="0.8" opacity="0.4"/>
    <line x1="80" y1="320" x2="200" y2="340" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="200" y1="340" x2="320" y2="320" stroke="#7b2ff7" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Network Nodes -->
  <g filter="url(#glow)">
    <circle cx="80" cy="80" r="8" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="320" cy="80" r="8" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="80" cy="320" r="8" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="320" cy="320" r="8" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="200" cy="60" r="6" fill="#c471f5" opacity="0.9"/>
    <circle cx="200" cy="340" r="6" fill="#c471f5" opacity="0.9"/>
    <!-- Inner ring nodes -->
    <circle cx="130" cy="160" r="4" fill="#00d4ff" opacity="0.7"/>
    <circle cx="270" cy="160" r="4" fill="#7b2ff7" opacity="0.7"/>
    <circle cx="130" cy="240" r="4" fill="#00d4ff" opacity="0.7"/>
    <circle cx="270" cy="240" r="4" fill="#7b2ff7" opacity="0.7"/>
  </g>
  
  <!-- The Z Letter -->
  <g filter="url(#glowStrong)">
    <path d="M 120 130 L 280 130 L 120 270 L 280 270" 
          fill="none" 
          stroke="url(#neonGrad)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Z highlight accent -->
  <path d="M 120 130 L 280 130" 
        fill="none" 
        stroke="#00d4ff" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.6"/>
  <path d="M 120 270 L 280 270" 
        fill="none" 
        stroke="#c471f5" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- Decorative dots on Z -->
  <circle cx="120" cy="130" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="280" cy="130" r="6" fill="#7b2ff7" filter="url(#glow)"/>
  <circle cx="120" cy="270" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="280" cy="270" r="6" fill="#c471f5" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="5" fill="white" opacity="0.8" filter="url(#glow)"/>
</svg>
