# Development docker-compose — builds from source
services:
  z-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z-ui
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - /var/lib/z-ui:/var/lib/z-ui
    cap_add:
      - NET_ADMIN

  postgres:
    image: postgres:16-alpine
    container_name: z-ui-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=zui
      - POSTGRES_USER=zui
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zui"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: z-ui-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
