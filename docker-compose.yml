# ╔══════════════════════════════════════════════════════════╗
# ║  Z-UI Docker Compose                                    ║
# ║  github.com/Zendan-ui/z-ui | @Zendan_Ui                 ║
# ╚══════════════════════════════════════════════════════════╝
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# For resource-constrained environments, this uses SQLite by default
# To use PostgreSQL instead, set: ZUI_DB_TYPE=postgres

services:
  z-ui:
    build:
      context: .
      # Use root Dockerfile so `docker compose up` works from project root
      # Both ./Dockerfile and ./docker/Dockerfile are now in sync
      dockerfile: Dockerfile
    container_name: z-ui
    restart: unless-stopped
    ports:
      - "${ZUI_PORT:-8443}:${ZUI_PORT:-8443}"
      - "443:443"
      - "80:80"
    volumes:
      - z-ui-data:/var/lib/z-ui
    environment:
      - ZUI_HOST=0.0.0.0
      - ZUI_PORT=${ZUI_PORT:-8443}
      # Use SQLite by default for resource-constrained environments
      # Change to 'postgres' to use PostgreSQL instead
      - ZUI_DB_TYPE=${ZUI_DB_TYPE:-sqlite}
      - ZUI_DB_SQLITE=/var/lib/z-ui/db/z-ui.db
      # Optional: PostgreSQL config if ZUI_DB_TYPE=postgres
      - ZUI_DB_HOST=postgres
      - ZUI_DB_PORT=5432
      - ZUI_DB_NAME=zui
      - ZUI_DB_USER=zui
      - ZUI_DB_PASS=${DB_PASSWORD:-changeme}
      # Redis
      - ZUI_REDIS_URL=redis://redis:6379
      # Security
      - ZUI_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ZUI_ADMIN_USER=${ADMIN_USER:-admin}
      - ZUI_ADMIN_PASS=${ADMIN_PASS:-admin}
      # Telegram Bot (optional)
      - ZUI_TELEGRAM_ENABLED=${ZUI_TELEGRAM_ENABLED:-false}
      - ZUI_TELEGRAM_TOKEN=${ZUI_TELEGRAM_TOKEN:-}
      - ZUI_TELEGRAM_ADMIN_ID=${ZUI_TELEGRAM_ADMIN_ID:-0}
      # Debug
      - ZUI_DEBUG=${ZUI_DEBUG:-false}
      - ZUI_DEFAULT_THEME=${ZUI_DEFAULT_THEME:-amoled}
    depends_on:
      redis:
        condition: service_healthy
      # Only depend on postgres if using postgres DB
      postgres:
        condition: service_healthy
    networks:
      - z-ui-net
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:${ZUI_PORT:-8443}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # PostgreSQL database (optional, not used by default)
  postgres:
    image: postgres:16-alpine
    container_name: z-ui-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=zui
      - POSTGRES_USER=zui
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zui"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - z-ui-net

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: z-ui-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - z-ui-net

volumes:
  z-ui-data:
  postgres-data:
  redis-data:

networks:
  z-ui-net:
    driver: bridge
